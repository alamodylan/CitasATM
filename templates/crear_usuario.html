{% extends "base.html" %}

{% block title %}
    Crear Usuario | ATM Citas
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-xl-7">

        <!-- ========================================== -->
        <!-- HEADER -->
        <!-- ========================================== -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2 class="fw-bold mb-1">

                    Crear Usuario

                </h2>

                <p class="text-muted mb-0">

                    Configuración de acceso y permisos

                </p>

                <div class="mt-2">
                    <span class="badge bg-dark fs-6">
                        Predio activo:
                        {{ active_predio_nombre }}
                    </span>
                </div>

            </div>

            <a
                href="{{ url_for('users.usuarios') }}"
                class="btn btn-outline-secondary"
            >

                <i class="bi bi-arrow-left"></i>

                Volver

            </a>

        </div>

        <!-- ========================================== -->
        <!-- FORM -->
        <!-- ========================================== -->
        <div class="card card-custom">

            <div class="card-body p-4">

                <form method="POST">

                    <div class="row g-4">

                        <!-- ========================== -->
                        <!-- USUARIO -->
                        <!-- ========================== -->
                        <div class="col-md-6">

                            <label class="form-label fw-semibold">

                                Usuario

                            </label>

                            <input
                                type="text"
                                name="username"
                                class="form-control form-control-lg"
                                required
                            >

                        </div>

                        <!-- ========================== -->
                        <!-- PASSWORD -->
                        <!-- ========================== -->
                        <div class="col-md-6">

                            <label class="form-label fw-semibold">

                                Contraseña

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control form-control-lg"
                                required
                            >

                        </div>

                        <!-- ========================== -->
                        <!-- ROL -->
                        <!-- ========================== -->
                        <div class="col-md-6">

                            <label class="form-label fw-semibold">

                                Rol

                            </label>

                            <select
                                name="role"
                                class="form-select form-select-lg"
                                required
                            >

                                <option value="">
                                    Seleccione
                                </option>

                                <option value="ADMIN">
                                    ADMIN
                                </option>

                                <option value="PREDIO">
                                    PREDIO
                                </option>

                                <option value="GUARDA">
                                    GUARDA
                                </option>

                            </select>

                        </div>

                        <!-- ========================== -->
                        <!-- PREDIOS -->
                        <!-- ========================== -->
                        <div class="col-md-12">

                            <label class="form-label fw-semibold">

                                Predios Permitidos

                            </label>

                            <div class="row g-3 mt-1">

                                {% for predio in predios %}

                                <div class="col-md-4">

                                    <div class="border rounded-4 p-3 bg-light h-100">

                                        <div class="form-check">

                                            <input
                                                class="form-check-input"
                                                type="checkbox"
                                                name="predios"
                                                value="{{ predio.id }}"
                                                id="predio_{{ predio.id }}"
                                            >

                                            <label
                                                class="form-check-label fw-semibold"
                                                for="predio_{{ predio.id }}"
                                            >

                                                {{ predio.nombre }}

                                            </label>

                                        </div>

                                    </div>

                                </div>

                                {% endfor %}

                            </div>

                        </div>

                    </div>

                    <!-- ============================== -->
                    <!-- BOTONES -->
                    <!-- ============================== -->
                    <div class="d-flex justify-content-end gap-3 mt-5">

                        <a
                            href="{{ url_for('users.usuarios') }}"
                            class="btn btn-secondary"
                        >

                            Cancelar

                        </a>

                        <button
                            type="submit"
                            class="btn btn-primary px-4"
                        >

                            <i class="bi bi-save-fill me-2"></i>

                            Guardar Usuario

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
