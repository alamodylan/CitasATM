{% extends "base.html" %}

{% block title %}
    Editar Cita | ATM Citas
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8 col-xl-7">

        <div class="card card-custom">

            <div class="card-header-custom d-flex justify-content-between align-items-center">

                <div>
                    <i class="bi bi-pencil-square me-2"></i>
                    Editar Cita
                </div>

                <a href="{{ url_for('citas.home') }}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                    Volver
                </a>

            </div>

            <div class="card-body p-4">

                <div class="alert alert-info rounded-4">
                    <strong>Predio activo:</strong>
                    {{ active_predio_nombre }}
                </div>

                {% if error %}
                <div class="alert alert-danger rounded-4">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('citas.editar_cita', cita_id=cita.id) }}">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label for="contenedor" class="form-label">Contenedor o BK</label>
                            <input
                                type="text"
                                id="contenedor"
                                name="contenedor"
                                class="form-control"
                                value="{{ cita.contenedor }}"
                                required
                            >
                        </div>

                        <div class="col-md-6">
                            <label for="chofer_nombre" class="form-label">Nombre del Chofer</label>
                            <input
                                type="text"
                                id="chofer_nombre"
                                name="chofer_nombre"
                                class="form-control"
                                value="{{ cita.chofer_nombre }}"
                                required
                            >
                        </div>

                        <div class="col-md-6">
                            <label for="chofer_cedula" class="form-label">Cédula del Chofer</label>
                            <input
                                type="text"
                                id="chofer_cedula"
                                name="chofer_cedula"
                                class="form-control"
                                value="{{ cita.chofer_cedula }}"
                                required
                            >
                        </div>

                        <div class="col-md-6">
                            <label for="cabezal_placa" class="form-label">Placa del Cabezal</label>
                            <input
                                type="text"
                                id="cabezal_placa"
                                name="cabezal_placa"
                                class="form-control"
                                value="{{ cita.cabezal_placa }}"
                                required
                            >
                        </div>

                        <div class="col-md-6">
                            <label for="naviera" class="form-label">Naviera</label>
                            <select
                                id="naviera"
                                name="naviera"
                                class="form-select"
                                required
                            >
                                <option value="COSCO" {% if cita.naviera == "COSCO" %}selected{% endif %}>COSCO</option>
                                <option value="ONE" {% if cita.naviera == "ONE" %}selected{% endif %}>ONE</option>
                                <option value="OOCL" {% if cita.naviera == "OOCL" %}selected{% endif %}>OOCL</option>
                                <option value="VASI" {% if cita.naviera == "VASI" %}selected{% endif %}>VASI</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="estado_contenedor" class="form-label">Estado del Contenedor</label>
                            <select
                                id="estado_contenedor"
                                name="estado_contenedor"
                                class="form-select"
                                required
                            >
                                <option value="Cargado" {% if cita.estado_contenedor == "Cargado" %}selected{% endif %}>Cargado</option>
                                <option value="Vacio" {% if cita.estado_contenedor == "Vacio" %}selected{% endif %}>Vacío</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label for="tipo_operacion" class="form-label">Tipo de Operación</label>
                            <select
                                id="tipo_operacion"
                                name="tipo_operacion"
                                class="form-select"
                                required
                            >
                                <option value="Retira" {% if cita.tipo_operacion == "Retira" %}selected{% endif %}>Retira</option>
                                <option value="Entrega" {% if cita.tipo_operacion == "Entrega" %}selected{% endif %}>Entrega</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label for="fecha" class="form-label">Fecha</label>
                            <input
                                type="date"
                                id="fecha"
                                name="fecha"
                                class="form-control"
                                value="{{ cita.fecha }}"
                                required
                            >
                        </div>

                        <div class="col-md-3">
                            <label for="horario" class="form-label">Horario</label>
                            <select
                                id="horario"
                                name="horario"
                                class="form-select"
                                required
                            >
                                {% for slot in time_slots %}
                                    <option
                                        value="{{ slot }}"
                                        {% if cita.horario == slot %}selected{% endif %}
                                    >
                                        {{ slot }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-4">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        Guardar Cambios
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
